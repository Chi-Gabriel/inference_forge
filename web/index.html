<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inference Forge Console</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar" class="sidebar">
        <div class="brand-row">
          <div class="brand-mark">IF</div>
          <div class="brand-copy">
            <p class="eyebrow">Inference Forge</p>
            <strong>Service console</strong>
          </div>
          <button id="sidebarToggle" class="icon-button sidebar-toggle" type="button" aria-label="Toggle sidebar">
            ☰
          </button>
        </div>

        <nav class="feature-nav" aria-label="Feature navigation">
          <button class="feature-link active" type="button" title="Multimodal embeddings">
            <span class="feature-icon">◇</span>
            <span class="feature-label">
              <strong>Embeddings</strong>
              <small>Video, image, and text</small>
            </span>
          </button>
          <button class="feature-link muted-link" type="button" disabled title="Dedicated reranking lab will use the same public API">
            <span class="feature-icon">≋</span>
            <span class="feature-label">
              <strong>Reranking</strong>
              <small>Coming next</small>
            </span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="status-card">
            <span id="apiStatus" class="pill neutral">Not checked</span>
            <button id="checkApi" type="button">Check API</button>
          </div>
          <label>
            API base URL
            <input id="apiBaseUrl" type="url" placeholder="http://localhost:8000" />
          </label>
          <label>
            API key
            <input id="apiKey" type="password" placeholder="Bearer token" autocomplete="off" />
          </label>
        </div>
      </aside>

      <main class="shell">
        <section class="hero">
          <div>
            <p class="eyebrow">Multimodal embeddings</p>
            <h1>Embedding lab</h1>
            <p class="muted">
              Test video, image, and text embeddings through the same public API that external clients use.
            </p>
          </div>
        </section>

        <section class="tabs" role="tablist" aria-label="Embedding labs">
          <button class="tab active" data-tab="video" type="button">Video</button>
          <button class="tab" data-tab="text" type="button">Text</button>
          <button class="tab" data-tab="image" type="button">Image</button>
        </section>

        <section id="videoTab" class="workspace tab-panel active">
          <form id="videoForm" class="panel controls">
            <div class="grid two">
              <label>
                Video upload
                <input id="videoFile" type="file" accept="video/*" />
              </label>
              <label>
                Video URL
                <input id="videoUrl" type="url" placeholder="https://example.com/video.mp4" />
              </label>
            </div>

            <div class="grid six">
              <label>
                <span class="label-row">
                  <span class="help-dot" title="Length of each video segment embedded as one searchable item. Smaller chunks are more precise but create more work.">?</span>
                  Chunk seconds
                </span>
                <input id="chunkSeconds" type="number" min="1" step="1" value="10" />
              </label>
              <label>
                <span class="label-row">
                  <span class="help-dot" title="Seconds shared between adjacent chunks. Helps avoid missing events at boundaries, but increases duplicate work.">?</span>
                  Overlap
                </span>
                <input id="overlapSeconds" type="number" min="0" step="1" value="0" />
              </label>
              <label>
                <span class="label-row">
                  <span class="help-dot" title="Frames sampled per second from video. Higher values capture more motion detail and use more GPU memory.">?</span>
                  FPS
                </span>
                <input id="videoFps" type="number" min="0.1" step="0.1" value="1" />
              </label>
              <label>
                <span class="label-row">
                  <span class="help-dot" title="Maximum sampled frames per chunk. This caps video cost even when chunk length or FPS is high.">?</span>
                  Max frames
                </span>
                <input id="maxFrames" type="number" min="1" step="1" value="16" />
              </label>
              <label>
                <span class="label-row">
                  <span class="help-dot" title="Embedding vector size. Lower dimensions are cheaper to store/search; higher dimensions preserve more detail.">?</span>
                  Dimensions
                </span>
                <input id="dimensions" type="number" min="64" max="4096" step="64" value="4096" />
              </label>
              <label>
                <span class="label-row">
                  <span class="help-dot" title="Number of highest-scoring matches returned for inspection.">?</span>
                  Top K
                </span>
                <input id="topK" type="number" min="1" step="1" value="8" />
              </label>
            </div>

            <label>
              Search query
              <input id="videoQuery" type="text" placeholder="person holding a product near a window" />
            </label>

            <div class="row">
              <label class="check">
                <input id="enableRerank" type="checkbox" />
                <span class="label-row">
                  <span class="help-dot" title="Runs a second relevance model after vector search so baseline embedding scores can be compared with reranker scores.">?</span>
                  Enable reranker second pass
                </span>
              </label>
              <button type="submit">Embed and search</button>
            </div>
          </form>

          <section class="panel results">
            <div class="video-layout">
              <div>
                <video id="videoPreview" controls></video>
                <div id="timeline" class="timeline" aria-label="Video score timeline"></div>
              </div>
              <div>
                <div class="result-head">
                  <h2>Results</h2>
                  <span id="latencyBadge" class="pill neutral">No run</span>
                </div>
                <div id="progressBox" class="progress-box">
                  <div class="progress-track"><div id="progressBar"></div></div>
                  <p id="progressLabel" class="muted">Waiting for input.</p>
                </div>
                <div id="resultList" class="result-list"></div>
              </div>
            </div>
          </section>
        </section>

        <section id="textTab" class="workspace tab-panel">
          <form id="textForm" class="panel controls">
            <label>
              Text corpus
              <textarea id="textCorpus" rows="8" placeholder="One item per line"></textarea>
            </label>
            <label>
              Query
              <input id="textQuery" type="text" placeholder="What should match?" />
            </label>
            <button type="submit">Embed text</button>
          </form>
          <section id="textResults" class="panel result-list"></section>
        </section>

        <section id="imageTab" class="workspace tab-panel">
          <form id="imageForm" class="panel controls">
            <label>
              Images
              <input id="imageFiles" type="file" accept="image/*" multiple />
            </label>
            <label>
              Query
              <input id="imageQuery" type="text" placeholder="Find images containing..." />
            </label>
            <button type="submit">Embed images</button>
          </form>
          <section id="imageResults" class="panel image-grid"></section>
        </section>

        <section class="panel">
          <div class="result-head">
            <h2>Run history</h2>
            <span class="muted">Memory-only for this page session</span>
          </div>
          <div id="historyList" class="history"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./app/main.js"></script>
  </body>
</html>
